name: AKM Reports Email

on:
  schedule:
    # 9:30 PM UAE time every night (UAE = UTC+4, so 17:30 UTC)
    # Script auto-detects: daily always, + monthly on last day, + VAT quarterly, + annual on Dec 31
    - cron: '30 17 * * *'
  # Run manually from GitHub Actions tab to test
  workflow_dispatch:

jobs:
  send-reports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install script dependencies
        run: npm install
        working-directory: scripts

      - name: Run reports
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node send-reports.mjs
        working-directory: scripts
